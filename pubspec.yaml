name: hungry
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  carousel_slider: ^5.1.1
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_credit_card: ^4.1.0
  flutter_rating_bar: ^4.0.1
  flutter_svg: ^2.2.3
  gap: ^3.0.1
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  google_fonts: ^6.3.3
  google_maps_flutter: ^2.14.2
  google_nav_bar: ^5.0.7
  image_picker: ^1.2.1
  path: ^1.9.1
  provider: ^6.1.5+1
  pull_to_refresh: ^2.0.0
  rename: ^3.1.0
  shared_preferences: ^2.5.4
  shimmer: ^3.0.0
  skeletonizer: ^2.1.2
  smooth_page_indicator: ^2.0.1
  supabase_flutter: ^2.12.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/logo/app_icon.png"
  web:
    generate: true
    image_path: "assets/logo/app_icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/splash/
    - assets/images/
    - assets/images/offers/
    - assets/icons/
    - assets/logo/
    - assets/svgs/
    - assets/images/paymenticons/
    - assets/
